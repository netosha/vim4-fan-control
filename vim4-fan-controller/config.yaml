---
name: "VIM4 Fan Controller"
version: "0.4.0"
slug: vim4_fan
description: "Control the Khadas VIM4 fan from Home Assistant (via SSH to the HAOS host, port 22222)"
url: "https://github.com/netosha/vim4-fan-control"
arch:
  - aarch64
startup: services
boot: auto
init: false

# No privilege escalation needed. The add-on reads /sys/class/fan/*
# directly (ro reads are fine) and shells writes out over SSH to the
# HAOS host's port-22222 debug SSH. An ed25519 keypair is generated
# automatically on first run at /data/ssh/id_ed25519; the user appends
# the public key to /root/.ssh/authorized_keys on the host once.
apparmor: true

services:
  - mqtt:need

options:
  poll_seconds: 10
  default_mode: auto
  startup_level: ""
  mqtt_discovery_prefix: homeassistant
  mqtt_base_topic: vim4/fan
  ssh_host: 172.30.32.1
  ssh_port: 22222
  ssh_user: root
  log_level: info

schema:
  poll_seconds: "int(1,600)"
  default_mode: "list(auto|manual)"
  startup_level: "list(|off|low|mid|high)"
  mqtt_discovery_prefix: "str"
  mqtt_base_topic: "str"
  ssh_host: "str"
  ssh_port: "int(1,65535)"
  ssh_user: "str"
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
